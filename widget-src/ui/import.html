<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --color-primary: #2563EB;
            --color-primary-hover: #1D4ED8;
            --color-bg: #FFFFFF;
            --color-text: #1F2937;
            --color-border: #E5E7EB;
            --color-input-bg: #F9FAFB;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 24px;
            margin: 0;
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .label {
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #374151;
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            margin-bottom: 20px;
            padding: 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            background-color: var(--color-input-bg);
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--color-primary);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            padding: 12px 24px;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
            width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        button:hover {
            background-color: var(--color-primary-hover);
        }
        
        button:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="label">Paste tasks below (separate lines)</div>
    <textarea id="input" placeholder="# Example #&#10;1. Review design specs&#10;2. Update components&#10;   - Fix button states&#10;   - Check contrast ratios"></textarea>
    <button id="import">Add to Checklist</button>

    <script>
        const textarea = document.getElementById('input');
        
        // Automatically focus the textarea
        textarea.focus();

        // Intercept paste to handle HTML/Rich Text content
        textarea.addEventListener('paste', (e) => {
            // Get the HTML content from the clipboard (requires permission or trusted event)
            const html = e.clipboardData.getData('text/html');
            
            if (html) {
                e.preventDefault(); // Prevent default paste behavior
                
                // Basic HTML parsing logic
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Walk the DOM and replace links
                const links = doc.querySelectorAll('a');
                links.forEach(a => {
                    const text = a.textContent;
                    const href = a.href;
                    if (href) {
                        a.textContent = `${text} (${href})`;
                    }
                });
                
                // Add newlines for block elements to preserve structure
                const blockElements = doc.querySelectorAll('p, div, li, h1, h2, h3, h4, h5, h6, tr');
                blockElements.forEach(el => {
                    el.appendChild(doc.createTextNode('\n'));
                });
                
                const brs = doc.querySelectorAll('br');
                brs.forEach(br => {
                    br.replaceWith(doc.createTextNode('\n'));
                });
                
                const cleanText = doc.body.textContent;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const before = text.substring(0, start);
                const after = text.substring(end, text.length);
                
                textarea.value = before + cleanText + after;
                
                // Restore cursor position
                textarea.selectionStart = textarea.selectionEnd = start + cleanText.length;
            }
        });

        document.getElementById('import').onclick = () => {
            const val = textarea.value.trim();
            if (val) {
                parent.postMessage({ pluginMessage: { type: 'add-tasks', text: val } }, '*');
            }
        }
    </script>
</body>

</html>
