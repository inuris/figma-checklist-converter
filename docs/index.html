<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--page-bg);
      color: var(--t-primary);
      -webkit-font-smoothing: antialiased;
    }

    .page-wrap {
      min-height: 100vh;
      padding: 24px 16px 48px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Outer gradient frame — matches widget Card */
    .gradient-card {
      padding: 6px;
      border-radius: 8px;
      width: 100%;
      max-width: 640px;
      background: radial-gradient(ellipse 140% 120% at 0% 100%, rgb(20, 244, 181) 0%, rgb(99, 102, 241) 52%, rgb(236, 72, 153) 100%);
    }

    /* Inner white / dark card */
    .inner-card {
      background: var(--t-bg);
      border-radius: 6px;
      box-shadow: 0 6px 12px var(--t-shadow);
      overflow: hidden;
    }

    /* Header */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--t-border);
      background: var(--t-bg);
    }
    .card-header .title-block { flex: 1; min-width: 0; }
    .card-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--t-primary);
    }
    .card-header .subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--t-muted);
    }
    .card-header .subtitle.all-done {
      color: var(--t-success);
      font-weight: 700;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: auto;
      padding: 8px;
      border: none;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      color: inherit;
    }
    .icon-btn:hover { background: var(--t-bg-hover); }
    .icon-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .icon-btn:disabled:hover { background: transparent; }
    .icon-btn svg { display: block; }

    /* Action bar */
    .action-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 24px;
      background: var(--t-bg-hover);
    }
    .action-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-bar-row--main {
      flex-wrap: nowrap;
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
    }
    .action-bar-left {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 12px;
      flex: 0 1 auto;
      min-width: 0;
    }
    .action-bar-spacer {
      flex: 1 1 0;
      min-width: 4px;
    }
    .action-bar-end {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
    }
    .action-bar-end.links {
      gap: 16px;
    }
    .action-bar-toggles {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 12px;
    }
    .btn-add-items {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: var(--t-accent);
      color: var(--t-white);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 8px var(--t-accent-shadow);
    }
    .btn-add-items:hover { background: var(--t-accent-hover); }

    .toggle-group { cursor: pointer; }
    .capsule {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 8px 16px;
      background: var(--t-white);
      border: 1.5px solid var(--t-border);
    }
    .capsule.on-move {
      border-color: var(--t-move);
      padding: 8px 16px 8px 8px;
    }
    .capsule.on-danger {
      border-color: var(--t-danger);
      padding: 8px 16px 8px 8px;
    }
    .capsule.off { padding: 8px 8px 8px 16px; }
    .capsule-knob {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .capsule-knob.muted { background: var(--t-border); }
    .capsule-knob.move { background: var(--t-move); }
    .capsule-knob.danger { background: var(--t-danger); }
    .capsule .label {
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
    }
    .capsule.off .label { color: var(--t-muted); }
    .capsule.on-move .label { color: var(--t-move); }
    .capsule.on-danger .label { color: var(--t-danger); }

    .action-bar-links {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }
    .link-muted {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: var(--t-muted);
      text-decoration: underline;
      cursor: pointer;
    }
    .link-muted:hover { color: var(--t-danger); }
    .link-danger {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: var(--t-danger);
      text-decoration: underline;
      cursor: pointer;
    }
    .link-danger:hover { color: var(--t-danger-hover); }

    .move-btns {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }
    .move-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: var(--t-move);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .move-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .export-wrap {
      display: flex;
      justify-content: flex-end;
    }
    .export-btn {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
    }
    .export-btn:hover { background: var(--t-surface); }

    .mode-tooltip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 4px 0 0;
      font-size: 12px;
      color: var(--t-muted);
    }
    .mode-tooltip span:last-child { text-align: right; }

    /* Tasks */
    .tasks-wrap { padding-bottom: 12px; }
    .task-block {
      position: relative;
    }
    .task-sep {
      height: 1px;
      background: var(--t-border);
      opacity: 0.5;
      margin: 0;
      border: none;
    }
    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 24px 16px 24px;
      background: var(--t-bg);
    }
    .task-row.child { padding-left: 56px; }
    .task-row:hover { background: var(--t-bg-hover); }

    .merge-float {
      position: absolute;
      left: 50%;
      top: -13px;
      transform: translateX(-50%);
      z-index: 2;
      padding: 6px;
      border-radius: 100px;
      border: none;
      background: var(--t-float-btn);
      box-shadow: 0 2px 4px var(--t-shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .merge-float:hover { background: var(--t-float-btn-hover); }

    .sq-20 {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1.5px solid transparent;
      cursor: pointer;
      box-sizing: border-box;
    }
    .checkbox-tile {
      background: var(--t-checkbox-bg);
      border-color: var(--t-checkbox-unchecked);
    }
    .checkbox-tile.checked {
      background: var(--t-accent);
      border-color: var(--t-accent);
    }
    .checkbox-tile:not(.checked):hover {
      border-color: var(--t-checkbox-hover);
    }
    .remove-tile {
      background: var(--t-remove-btn-bg);
      border: none;
    }
    .remove-tile:hover { background: var(--t-remove-btn-hover); }
    .indent-tile {
      background: var(--t-surface);
      border: none;
    }
    .indent-tile:hover { background: var(--t-border); }
    .move-select-tile {
      background: var(--t-checkbox-bg);
      border-color: var(--t-checkbox-unchecked);
    }
    .move-select-tile.selected {
      background: var(--t-move-bg);
      border-color: var(--t-move-bg);
    }
    .move-select-tile:not(.selected):hover {
      border-color: var(--t-checkbox-hover);
    }

    .task-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-readonly {
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
    }
    .task-readonly.parent { font-weight: 600; }
    .task-readonly.checked {
      color: var(--t-task-checked);
      text-decoration: line-through;
    }
    .task-readonly.child:not(.checked) { color: var(--t-task-child); }
    .task-edit {
      width: 100%;
      min-height: 48px;
      padding: 0;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      overflow: hidden;
      color: inherit;
      outline: none;
      box-sizing: border-box;
    }
    .task-edit.parent { font-weight: 600; }
    .task-edit.checked {
      color: var(--t-task-checked);
      text-decoration: line-through;
    }
    .task-edit.child:not(.checked) { color: var(--t-task-child); }

    .url-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      align-self: flex-start;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--t-edit-active-bg);
      border: 1px solid var(--t-link-border);
      text-decoration: none;
      font-size: 12px;
      color: var(--t-accent);
    }
    .url-chip:hover { background: var(--t-link-hover); }
    .url-chip span { text-decoration: underline; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 200px;
      padding: 24px;
    }
    .empty-state p { margin: 0; font-size: 14px; color: var(--t-muted); }
    .empty-state .accent-line {
      font-weight: 700;
      color: var(--t-accent);
    }

    /* Modals */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .modal-panel {
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .modal-panel.dark {
      background: #1e293b;
      color: #f1f5f9;
    }
    .modal-head {
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 1px solid #e5e7eb;
    }
    .modal-panel.dark .modal-head { border-color: #334155; color: #f1f5f9; }
    .modal-body { padding: 24px; display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .modal-body .field-label {
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 14px;
      color: #374151;
    }
    .modal-panel.dark .field-label { color: #cbd5e1; }
    .modal-body textarea {
      width: 100%;
      flex: 1;
      min-height: 180px;
      margin-bottom: 20px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
    }
    .modal-panel.dark .modal-body textarea {
      background: #0f172a;
      border-color: #334155;
      color: #f1f5f9;
    }
    .modal-body textarea:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .modal-panel.dark .modal-body textarea:focus {
      border-color: #3b82f6;
      background: #1e293b;
    }
    .modal-body .btn-primary-modal {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-body .btn-primary-modal:hover { background: #1d4ed8; }

    .export-modal textarea {
      font-family: "Courier New", monospace;
      font-size: 13px;
      min-height: 220px;
      background: #fff;
      color: #111827;
    }
    .export-modal .field-label { font-size: 12px; color: #64748b; font-weight: 500; letter-spacing: 0.02em; }
    .btn-copy {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-copy:hover { background: #2563eb; }
    .btn-copy.copied { background: #22c55e; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
